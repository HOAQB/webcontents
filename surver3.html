<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소프트웨어 기술 설문조사</title>
</head>
<body>

    <header>
        <h1>설문지</h1>
        <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
        <hr>
    </header>

    <section>
        <form>
    
            <p>
                학년 
                <input type="radio" name="grade" id="grade1" checked> <label for="grade1">1학년</label>
                <input type="radio" name="grade" id="grade2"> <label for="grade2">2학년</label>
                <input type="radio" name="grade" id="grade3"> <label for="grade3">3학년</label>
            </p>

            
            <p>
                성별 
                <input type="radio" name="gender" id="male"> <label for="male">남</label>
                <input type="radio" name="gender" id="female"> <label for="female">여</label>
            </p>

            
            <p>
                관심 분야 
                <select name="interest">
                    <option value="mobile" selected>모바일 소프트웨어</option>
                    <option value="ai">인공지능(AI)</option>
                    <option value="security">컴퓨터 보안</option>
                    <option value="system">시스템/하드웨어</option>
                </select>
            </p>

            
            <p>
                진로 
                <input type="checkbox" name="career" id="dev" checked> <label for="dev">개발</label>
                <input type="checkbox" name="career" id="plan"> <label for="plan">기획</label>
                <input type="checkbox" name="career" id="sales"> <label for="sales">영업</label>
                <input type="checkbox" name="career" id="startup"> <label for="startup">창업</label>
            </p>

            
            <p>
                남기고 싶은 말<br>
                <textarea rows="10" cols="50" placeholder="글을 남겨주세요"></textarea>
            </p>
        </form>
    </section>

    <footer>
        <p>Copyright 2026 by MYONGJI COLLEGE</p>
        <!-- 메인 페이지로 돌아가는 링크 (옵션) -->
        <p><a href="about me(structured).html">홈으로 돌아가기</a></p>
    </footer>

</body>
</html>
